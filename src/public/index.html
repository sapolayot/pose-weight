<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เข้าสู่ระบบ - POSE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/login.css" />

    <style>
      /* --- Reset & Global Styles --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Sarabun", sans-serif;
      }

      body {
        background-color: #f0f4f8; /* พื้นหลังภายนอกบน Desktop */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* --- Main App Container (ขนาดฟิกซ์สำหรับ Desktop) --- */
      .app-container {
        width: 360px;
        height: 760px;
        background-color: #d6eefa;
        border-radius: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* จัดการ์ดขาวไว้ด้านล่าง */
        overflow: hidden;
        position: relative;
        border: 12px solid #1a1a1a; /* ขอบจำลองมือถือ */
      }

      /* =========================================
           1. สไตล์หน้า Splash Screen (ครอบทับด้านบน)
         ========================================= */
      .splash-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #d6eefa;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 999; /* อยู่บนสุดเพื่อบังหน้า Login ไว้ก่อน */
        transition:
          opacity 0.5s ease-out,
          visibility 0.5s; /* เอฟเฟกต์ตอนเฟดออก */
      }

      /* เมื่อโหลดเสร็จคลาสนี้จะถูกใส่ผ่าน JS เพื่อซ่อนหน้าจอ */
      .splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* กล่องโลโก้จำลอง */
      .splash-logo-box {
        width: 160px;
        height: 75px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        margin-bottom: 40px;
      }

      .splash-title {
        font-size: 20px;
        font-weight: 700;
        color: #1e3a8a;
        margin-bottom: 4px;
      }

      .splash-subtitle {
        font-size: 13px;
        color: #60a5fa;
        font-weight: 500;
      }

      /* ส่วนท้ายของ Splash screen (แถบโหลด) */
      .splash-footer {
        position: absolute;
        bottom: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      /* ตัว Loading Bar */
      .progress-bar {
        width: 90px;
        height: 4px;
        background-color: #bfdbfe;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }

      .progress-bar {
        width: 90px;
        height: 4px;
        background-color: #bfdbfe;
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background-color: #3b82f6;
        border-radius: 2px;
        transition: width 0.1s linear;
      }

      @keyframes loading-run {
        0% {
          left: -50%;
        }
        100% {
          left: 100%;
        }
      }

      .loading-text {
        font-size: 12px;
        color: #93c5fd;
      }

      /* =========================================
           2. สไตล์หน้าเนื้อหาหลัก (Login Screen)
         ========================================= */
      .main-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .header-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 80px;
      }

      .logo-box {
        width: 160px;
        margin-bottom: 10px;
      }

      .brand-subtext {
        font-size: 12px;
        color: #1e3a8a;
        font-weight: 500;
        text-align: center;
      }

      .login-card {
        background-color: #ffffff;
        border-top-left-radius: 35px;
        border-top-right-radius: 35px;
        padding: 40px 24px 30px 24px;
        width: 100%;
      }

      .main-title {
        font-size: 26px;
        color: #1e293b;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .sub-title {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 30px;
      }

      .input-group {
        position: relative;
        display: flex;
        align-items: center;
        margin-bottom: 16px;
      }

      .input-group input {
        width: 100%;
        padding: 16px 16px 16px 48px;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        background-color: #f8fafc;
        font-size: 16px;
        outline: none;
      }

      .input-icon {
        position: absolute;
        left: 18px;
        color: #94a3b8;
        font-size: 18px;
      }

      .toggle-password {
        position: absolute;
        right: 18px;
        color: #94a3b8;
        cursor: pointer;
      }

      .submit-btn {
        width: 100%;
        padding: 16px;
        background-color: #539dd1;
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
      }

      .form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
        font-size: 13px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        color: #64748b;
        cursor: pointer;
      }

      .remember-me input {
        margin-right: 8px;
        accent-color: #539dd1;
        width: 16px;
        height: 16px;
      }

      .forgot-password {
        color: #539dd1;
        text-decoration: none;
      }

      /* =========================================
           3. Responsive สำหรับเปิดในหน้าจอมือถือจริง
         ========================================= */
      @media (max-width: 480px) {
        body {
          background-color: #dbeafe;
        }
        .app-container {
          width: 100vw;
          height: 100vh;
          border-radius: 0;
          border: none;
          box-shadow: none;
        }
        .login-card {
          padding-bottom: env(safe-area-inset-bottom, 30px);
        }
      }
    </style>

    <script src="./js/login.js"></script>
  </head>
  <body>
    <div class="app-container">
      <div id="splashScreen" class="splash-screen">
        <div class="splash-logo-box">
          <img src="./img/Logo_Pose.png" alt="logo_pose" width="100%" />
        </div>
        <h2 class="splash-title">โพสเฮลท์แคร์</h2>
        <p class="splash-subtitle">Pose Health Care Co., Ltd.</p>

        <div class="splash-footer">
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <span class="loading-text">กำลังโหลด...</span>
        </div>
      </div>

      <div class="main-content">
        <div class="header-section">
          <div class="logo-box">
            <img src="./img/Logo_Pose.png" alt="logo_pose" width="100%" />
          </div>
          <p class="brand-subtext">Professional Prevention Infection Control</p>
        </div>

        <div class="login-card">
          <h1 class="main-title">เข้าสู่ระบบ</h1>
          <p class="sub-title">ระบบห้องชั่งน้ำหนักสารเคมี</p>

          <form id="login-form">
            <div class="input-group">
              <i class="fa-regular fa-user input-icon"></i>
              <input
                type="text"
                id="username"
                placeholder="ชื่อผู้ใช้"
                required
              />
            </div>

            <div class="input-group">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                id="password"
                placeholder="รหัสผ่าน"
                class="password-input"
                required
              />
              <i class="fa-regular fa-eye toggle-password"></i>
            </div>

            <button type="submit" class="submit-btn">เข้าสู่ระบบ</button>

            <div class="form-footer">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe" checked />
                <span class="checkmark"></span>
                จดจำฉัน
              </label>
              <a
                href="#"
                class="forgot-password"
                onclick="alert('กรุณาติดต่อฝ่าย IT')"
                >ลืมรหัสผ่าน?</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const togglePassword = document.getElementById("toggle-password");
        const passwordInput = document.getElementById("password");

        if (togglePassword && passwordInput) {
          togglePassword.addEventListener("click", function () {
            const show = passwordInput.type === "password";

            console.log("show", show);

            passwordInput.type = show ? "text" : "password";

            this.classList.remove("fa-eye", "fa-eye-slash");
            this.classList.add(show ? "fa-eye-slash" : "fa-eye");
          });
        }

        let progress = 0;
        const fill = document.querySelector(".progress-fill");
        const splash = document.getElementById("splashScreen");

        const interval = setInterval(() => {
          progress += Math.floor(Math.random() * 8) + 2;

          if (progress >= 100) {
            progress = 100;
            fill.style.width = "100%";
            clearInterval(interval);

            // 👇 fade out เมื่อเต็มจริง
            setTimeout(() => {
              splash.classList.add("fade-out");
              splash.style.zIndex = "-1";
            }, 300);
            return;
          }

          fill.style.width = progress + "%";
        }, 80);
      });
    </script>
  </body>
</html>
