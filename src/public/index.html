<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POSE App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      /* --- Reset & Global Styles --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Sarabun", sans-serif;
      }

      body {
        background-color: #f0f4f8; /* พื้นหลังภายนอกบน Desktop */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* --- Main App Container (ขนาดฟิกซ์สำหรับ Desktop) --- */
      .app-container {
        width: 360px;
        height: 760px;
        background-color: #d6eefa;
        border-radius: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* จัดการ์ดขาวไว้ด้านล่าง */
        overflow: hidden;
        position: relative;
        border: 12px solid #1a1a1a; /* ขอบจำลองมือถือ */
      }

      /* =========================================
           1.สไตล์หน้า Splash Screen (ครอบทับด้านบน)
           ========================================= */
      .splash-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #d6eefa;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 999; /* อยู่บนสุด */
        transition:
          opacity 0.5s ease-out,
          visibility 0.5s; /* เอฟเฟกต์ตอนเฟดออก */
      }

      /* เมื่อโหลดเสร็จคลาสนี้จะถูกใส่ผ่าน JS เพื่อซ่อนหน้าจอ */
      .splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      /* กล่องโลโก้จำลอง */
      .splash-logo-box {
        width: 160px;
        height: 75px;
        background-color: #dbeafe;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        margin-bottom: 40px;
      }

      .splash-logo-text {
        font-size: 32px;
        font-weight: 800;
        color: #2563eb;
        font-style: italic;
        letter-spacing: 2px;
      }

      .splash-registered {
        position: absolute;
        top: 2px;
        right: 2px;
        font-size: 10px;
        color: #2563eb;
      }

      .splash-title {
        font-size: 20px;
        font-weight: 700;
        color: #1e3a8a;
        margin-bottom: 4px;
      }

      .splash-subtitle {
        font-size: 13px;
        color: #60a5fa;
        font-weight: 500;
      }

      /* ส่วนท้ายของ Splash screen (แถบโหลด) */
      .splash-footer {
        position: absolute;
        bottom: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      /* ตัว Loading Bar */
      .progress-bar {
        width: 90px;
        height: 4px;
        background-color: #bfdbfe;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }

      /* แอนิเมชันวิ่งซ้ายไปขวาขัดตาทัพตอนโหลด */
      .progress-bar::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 50%;
        background-color: #3b82f6;
        border-radius: 2px;
        animation: loading-run 1.5s infinite linear;
      }

      @keyframes loading-run {
        0% {
          left: -50%;
        }
        100% {
          left: 100%;
        }
      }

      .loading-text {
        font-size: 12px;
        color: #93c5fd;
      }

      /* =========================================
           2. สไตล์หน้าเนื้อหาหลัก (Login Screenเดิม)
           ========================================= */
      .main-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .header-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 80px;
      }

      .login-card {
        background-color: #ffffff;
        border-top-left-radius: 35px;
        border-top-right-radius: 35px;
        padding: 40px 24px 30px 24px;
        width: 100%;
      }

      .main-title {
        font-size: 26px;
        color: #1e293b;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .sub-title {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 30px;
      }

      .login-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .input-group {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-group input {
        width: 100%;
        padding: 16px 16px 16px 48px;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        background-color: #f8fafc;
        font-size: 16px;
        outline: none;
      }
      .input-icon {
        position: absolute;
        left: 18px;
        color: #94a3b8;
        font-size: 18px;
      }
      .toggle-password {
        position: absolute;
        right: 18px;
        color: #94a3b8;
        cursor: pointer;
      }

      .submit-btn {
        width: 100%;
        padding: 16px;
        background-color: #539dd1;
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
      }

      .form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
        font-size: 13px;
      }
      .remember-me {
        display: flex;
        align-items: center;
        color: #64748b;
        cursor: pointer;
      }
      .remember-me input {
        margin-right: 8px;
        accent-color: #539dd1;
        width: 16px;
        height: 16px;
      }
      .forgot-password {
        color: #539dd1;
        text-decoration: none;
      }

      /* =========================================
           3. Responsive สำหรับเปิดในหน้าจอมือถือจริง
           ========================================= */
      @media (max-width: 480px) {
        body {
          background-color: #dbeafe;
        }
        .app-container {
          width: 100vw;
          height: 100vh;
          border-radius: 0;
          border: none;
          box-shadow: none;
        }
        .login-card {
          padding-bottom: env(safe-area-inset-bottom, 30px);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div id="splashScreen" class="splash-screen">
        <div class="splash-logo-box">
          <img src="./img/Logo_Pose.png" alt="logo_pose" width="100%" />
        </div>
        <h2 class="splash-title">โพสเฮลท์แคร์</h2>
        <p class="splash-subtitle">Pose Health Care Co., Ltd.</p>

        <div class="splash-footer">
          <div class="progress-bar"></div>
          <span class="loading-text">กำลังโหลด...</span>
        </div>
      </div>
    </div>

    <script>
      // ใช้คำสั่ง DOMContentLoaded เพื่อเช็คว่าโครงสร้าง DOM โหลดเสร็จเรียบร้อยแล้ว
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          const splash = document.getElementById("splashScreen");

          if (splash) {
            splash.classList.add("fade-out");
            // รอให้ animation จบก่อนค่อยเปลี่ยนหน้า
            setTimeout(() => {
              window.location.href = "login.html";
            }, 500); // ต้องตรงกับ transition 0.5s
          }
        }, 1000);
      });
    </script>
  </body>
</html>
