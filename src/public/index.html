<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHC Weighing — M1 Prototype v3</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/splash.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="main-content">
        <div class="header-section">
          <div class="logo-box">
            <img src="./img/Logo_Pose.png" alt="logo_pose" width="100%" />
          </div>
          <p class="brand-subtext">Professional Prevention Infection Control</p>
        </div>

        <div class="login-card">
          <h1 class="main-title">เข้าสู่ระบบ</h1>
          <p class="sub-title">ระบบห้องชั่งน้ำหนักสารเคมี</p>

          <form id="login-form">
            <div class="input-group">
              <i class="fa-regular fa-user input-icon"></i>
              <input
                type="text"
                id="username"
                placeholder="ชื่อผู้ใช้"
                required
              />
            </div>

            <div class="input-group">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                id="password"
                placeholder="รหัสผ่าน"
                class="password-input"
                required
              />
              <i class="fa-regular fa-eye toggle-password"></i>
            </div>

            <button type="submit" class="submit-btn">เข้าสู่ระบบ</button>

            <div class="form-footer">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe" checked />
                <span class="checkmark"></span>
                จดจำฉัน
              </label>
              <a
                href="#"
                class="forgot-password"
                onclick="alert('กรุณาติดต่อฝ่าย IT')"
                >ลืมรหัสผ่าน?</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="./js/splash.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
